function b64ToUtf8(b64str){
  const binary = atob(b64str);
  const bytes = new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}

const frames = {
  stage1: document.getElementById('frame-stage1'),
  stage2: document.getElementById('frame-stage2'),
  arch:   document.getElementById('frame-arch'),
};
const loaded = { stage1:false, stage2:false, arch:false };

function loadTab(key){
  if(loaded[key]) return;
  frames[key].srcdoc = b64ToUtf8(B64[key]);
  loaded[key] = true;
}

function activateTab(key){
  Object.keys(frames).forEach(k=>{
    frames[k].classList.toggle('active', k===key);
  });
  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.classList.toggle('active', btn.dataset.tab===key);
  });
  loadTab(key);
}

document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>activateTab(btn.dataset.tab));
});

// Eagerly load the first tab; lazy-load the rest on first visit
// (keeps initial page weight lower, but pre-warm Stage 1 immediately).
loadTab('stage1');
</script>
